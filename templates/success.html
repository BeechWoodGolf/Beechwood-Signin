<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beechwood — Thank You</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0d1f3c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      padding: 52px 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .check {
      width: 64px;
      height: 64px;
      background: #1B3A6B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
    }
    .check svg { width: 32px; height: 32px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #0d1f3c;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .divider {
      width: 48px;
      height: 3px;
      background: #2952A3;
      margin: 16px auto;
      border-radius: 2px;
    }
    p {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      color: #1a2744;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .btn-new {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 36px;
      background: #1B3A6B;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-new:hover { background: #2952A3; }
    footer {
      margin-top: 30px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Waiver Signed</h1>
    <div class="divider"></div>
    <p>Thank you, <strong>{{ name }}</strong>.</p>
    <p>Your Golf Cart Liability Waiver has been recorded. Enjoy your round!</p>
    <a href="/" class="btn-new">Next Player &rarr;</a>
  </div>
  <footer>Beechwood Golf Course &mdash; Est. 1960</footer>
</body>
</html>
